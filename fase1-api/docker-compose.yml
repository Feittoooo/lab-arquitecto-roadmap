services:
  mongo:
    image: mongo:7
    container_name: mongo-lab
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo-data:/data/db
  
  api:
    build: .
    container_name: api-lab
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://admin:admin123@mongo:27017
      PORT: 3000
    depends_on:
      - mongo

volumes:
  mongo-data: